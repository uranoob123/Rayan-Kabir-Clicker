<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayan Kabir Clicker</title>
    <style>
        /* General Setup */
        body {
            font-family: 'Georgia', serif; 
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #111;
            user-select: none; 
        }

        /* Left Side - The Game Area */
        .game-area {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #4a3b2c 0%, #1a1410 80%);
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .title {
            position: absolute;
            top: 20px;
            font-size: 36px;
            color: #f1c40f;
            margin: 0;
            text-align: center;
            width: 100%;
            background: rgba(0,0,0,0.3);
            padding: 10px 0;
            border-bottom: 2px solid #5c4033;
        }

        .score-board {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px 40px;
            border-radius: 100px; 
            border: 3px solid #6b4c3a;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .score-label {
            font-size: 24px;
            color: #d3b8ae;
        }

        .score {
            font-size: 64px;
            font-weight: bold;
            color: #fff;
            margin: 5px 0;
        }

        /* The Clickable Image */
        .clickable-image {
            max-width: 300px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.05s ease-in-out;
            filter: drop-shadow(0 0 20px rgba(255, 200, 100, 0.3)); 
            z-index: 10;
        }
        
        .clickable-image:active {
            transform: scale(0.92);
            filter: drop-shadow(0 0 10px rgba(255, 200, 100, 0.5)); 
        }

        /* Right Side - The Shop */
        .shop-area {
            width: 350px;
            background-color: #2b1d14; 
            border-left: 6px solid #1a100b;
            display: flex;
            flex-direction: column;
            color: #eee;
            box-shadow: -10px 0 20px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .shop-header {
            background-color: #1a100b;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #e6c280;
            border-bottom: 4px solid #3d2817;
        }

        .shop-items {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Upgrade Buttons */
        .upgrade-btn {
            background: linear-gradient(to bottom, #5c4033, #3d2817);
            border: 2px solid #1a100b;
            color: white;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            position: relative;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 4px 6px rgba(0,0,0,0.4);
        }

        .upgrade-btn:hover:not(:disabled) {
            background: linear-gradient(to bottom, #6b4c3a, #4a3b2c);
            transform: translateY(-2px);
        }

        .upgrade-btn:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
        }

        .upgrade-btn:disabled {
            background: #2b2b2b;
            color: #666;
            border-color: #111;
            cursor: not-allowed;
            box-shadow: none;
        }

        .upgrade-icon {
            font-size: 30px;
            margin-right: 15px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            min-width: 30px;
            text-align: center;
        }

        .upgrade-details {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .upgrade-name {
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        .upgrade-cost {
            font-size: 16px;
            color: #2ecc71;
            margin-top: 5px;
            font-family: monospace;
            font-weight: bold;
        }

        .upgrade-btn:disabled .upgrade-cost {
            color: #888;
        }

        /* Stats Section */
        .stats {
            background-color: #1a100b;
            padding: 15px;
            font-size: 14px;
            border-top: 4px solid #3d2817;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .stats div {
            display: flex;
            justify-content: space-between;
            color: #a88b7d;
        }

        .stats strong {
            color: #fff;
        }

        /* Save & Reset Controls */
        .controls {
            display: flex;
            gap: 10px;
            padding: 10px 15px 15px;
            background-color: #1a100b;
        }

        .control-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }

        .control-btn:hover {
            opacity: 0.8;
        }

        .btn-save { background-color: #27ae60; }
        .btn-reset { background-color: #c0392b; }

        #saveNotice {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="game-area">
        <h1 class="title">Rayan Kabir Clicker</h1>
        
        <div class="score-board">
            <div class="score-label">Rayan Points</div>
            <div class="score" id="score">0</div>
        </div>

        <img id="rayanImage" src="rayan.png" alt="Click Rayan!" class="clickable-image" onclick="clickRayan()" draggable="false">

        <div id="saveNotice">Game Saved!</div>
    </div>

    <div class="shop-area">
        <div class="shop-header">Store</div>
        
        <div class="shop-items">
            <button class="upgrade-btn" id="btnClickUpgrade" onclick="buyClickUpgrade()">
                <div class="upgrade-icon">🖱️</div>
                <div class="upgrade-details">
                    <span class="upgrade-name">Stronger Clicks (+1)</span>
                    <span class="upgrade-cost" id="costClickUpgrade">Cost: 15</span>
                </div>
            </button>
            
            <button class="upgrade-btn" id="btnAutoClicker" onclick="buyAutoClicker()">
                <div class="upgrade-icon">🤖</div>
                <div class="upgrade-details">
                    <span class="upgrade-name">Rayan Bot (+1/s)</span>
                    <span class="upgrade-cost" id="costAutoClicker">Cost: 50</span>
                </div>
            </button>

            <button class="upgrade-btn" id="btnMegaClick" onclick="buyMegaClick()">
                <div class="upgrade-icon">💪</div>
                <div class="upgrade-details">
                    <span class="upgrade-name">Mega Click (+10)</span>
                    <span class="upgrade-cost" id="costMegaClick">Cost: 500</span>
                </div>
            </button>

            <button class="upgrade-btn" id="btnFactory" onclick="buyFactory()">
                <div class="upgrade-icon">🏭</div>
                <div class="upgrade-details">
                    <span class="upgrade-name">Factory (+10/s)</span>
                    <span class="upgrade-cost" id="costFactory">Cost: 1000</span>
                </div>
            </button>

            <button class="upgrade-btn" id="btnMine" onclick="buyMine()">
                <div class="upgrade-icon">⛏️</div>
                <div class="upgrade-details">
                    <span class="upgrade-name">Mine (+50/s)</span>
                    <span class="upgrade-cost" id="costMine">Cost: 4000</span>
                </div>
            </button>
        </div>

        <div class="stats">
            <div>Click Power: <strong id="clickPower">1</strong></div>
            <div>Bots: <strong id="autoClickers">0</strong> | Factories: <strong id="factories">0</strong> | Mines: <strong id="mines">0</strong></div>
            <div>Points per second: <strong id="pps">0</strong></div>
        </div>

        <div class="controls">
            <button class="control-btn btn-save" onclick="saveGame(true)">Save Game</button>
            <button class="control-btn btn-reset" onclick="resetGame()">Hard Reset</button>
        </div>
    </div>

    <script>
        // Game Variables
        let score = 0;
        let clickPower = 1;
        
        // Building Counts
        let autoClickers = 0;
        let factories = 0;
        let mines = 0;

        // Image Evolution Tracker
        let evolutionStage = 0; 
        
        // Costs
        let clickUpgradeCost = 15;
        let autoClickerCost = 50;
        let megaClickCost = 500;
        let factoryCost = 1000;
        let mineCost = 4000;

        function saveGame(showNotice = false) {
            let gameSave = {
                score: score,
                clickPower: clickPower,
                autoClickers: autoClickers,
                factories: factories,
                mines: mines,
                evolutionStage: evolutionStage,
                clickUpgradeCost: clickUpgradeCost,
                autoClickerCost: autoClickerCost,
                megaClickCost: megaClickCost,
                factoryCost: factoryCost,
                mineCost: mineCost
            };
            
            localStorage.setItem("rayanClickerSave", JSON.stringify(gameSave));

            if (showNotice) {
                let notice = document.getElementById("saveNotice");
                notice.style.opacity = 1;
                setTimeout(() => { notice.style.opacity = 0; }, 2000);
            }
        }

        function loadGame() {
            let savedGame = JSON.parse(localStorage.getItem("rayanClickerSave"));
            
            if (savedGame !== null) {
                if (typeof savedGame.score !== "undefined") score = savedGame.score;
                if (typeof savedGame.clickPower !== "undefined") clickPower = savedGame.clickPower;
                if (typeof savedGame.autoClickers !== "undefined") autoClickers = savedGame.autoClickers;
                if (typeof savedGame.factories !== "undefined") factories = savedGame.factories;
                if (typeof savedGame.mines !== "undefined") mines = savedGame.mines;
                if (typeof savedGame.evolutionStage !== "undefined") evolutionStage = savedGame.evolutionStage;
                
                if (typeof savedGame.clickUpgradeCost !== "undefined") clickUpgradeCost = savedGame.clickUpgradeCost;
                if (typeof savedGame.autoClickerCost !== "undefined") autoClickerCost = savedGame.autoClickerCost;
                if (typeof savedGame.megaClickCost !== "undefined") megaClickCost = savedGame.megaClickCost;
                if (typeof savedGame.factoryCost !== "undefined") factoryCost = savedGame.factoryCost;
                if (typeof savedGame.mineCost !== "undefined") mineCost = savedGame.mineCost;

                // Restores the correct image including rayan5
                if (evolutionStage === 1) document.getElementById("rayanImage").src = "rayan1.png";
                if (evolutionStage === 2) document.getElementById("rayanImage").src = "rayan2.png";
                if (evolutionStage === 3) document.getElementById("rayanImage").src = "rayan3.png";
                if (evolutionStage === 4) document.getElementById("rayanImage").src = "rayan4.png";
                if (evolutionStage === 5) document.getElementById("rayanImage").src = "rayan5.png";
                if (evolutionStage === 5) document.getElementById("rayanImage").src = "rayan6.png";
            }
        }

        function resetGame() {
            if (confirm("Are you sure you want to completely reset your progress? This cannot be undone!")) {
                localStorage.removeItem("rayanClickerSave");
                location.reload(); 
            }
        }

        setInterval(() => {
            saveGame();
        }, 10000);

        function clickRayan() {
            score += clickPower;
            updateDisplay();
        }

        function buyClickUpgrade() {
            if (score >= clickUpgradeCost) {
                score -= clickUpgradeCost;
                clickPower += 1;
                clickUpgradeCost = Math.floor(clickUpgradeCost * 1.5); 
                updateDisplay();
            }
        }

        function buyAutoClicker() {
            if (score >= autoClickerCost) {
                score -= autoClickerCost;
                autoClickers += 1;
                autoClickerCost = Math.floor(autoClickerCost * 1.3);
                updateDisplay();
            }
        }

        function buyMegaClick() {
            if (score >= megaClickCost) {
                score -= megaClickCost;
                clickPower += 10;
                megaClickCost = Math.floor(megaClickCost * 1.6);
                updateDisplay();
            }
        }

        function buyFactory() {
            if (score >= factoryCost) {
                score -= factoryCost;
                factories += 1;
                factoryCost = Math.floor(factoryCost * 1.3);
                updateDisplay();
            }
        }

        function buyMine() {
            if (score >= mineCost) {
                score -= mineCost;
                mines += 1;
                mineCost = Math.floor(mineCost * 1.3);
                updateDisplay();
            }
        }

        setInterval(() => {
            let totalPPS = (autoClickers * 1) + (factories * 10) + (mines * 50);
            
            if (totalPPS > 0) {
                score += (totalPPS / 10); 
                updateDisplay();
            }
        }, 100);

        function updateDisplay() {
            document.getElementById("score").innerText = Math.floor(score);
            document.getElementById("clickPower").innerText = clickPower;
            
            document.getElementById("autoClickers").innerText = autoClickers;
            document.getElementById("factories").innerText = factories;
            document.getElementById("mines").innerText = mines;
            
            let currentPPS = (autoClickers * 1) + (factories * 10) + (mines * 50);
            document.getElementById("pps").innerText = currentPPS; 

            document.getElementById("costClickUpgrade").innerText = `Cost: ${clickUpgradeCost}`;
            document.getElementById("costAutoClicker").innerText = `Cost: ${autoClickerCost}`;
            document.getElementById("costMegaClick").innerText = `Cost: ${megaClickCost}`;
            document.getElementById("costFactory").innerText = `Cost: ${factoryCost}`;
            document.getElementById("costMine").innerText = `Cost: ${mineCost}`;

            document.getElementById("btnClickUpgrade").disabled = score < clickUpgradeCost;
            document.getElementById("btnAutoClicker").disabled = score < autoClickerCost;
            document.getElementById("btnMegaClick").disabled = score < megaClickCost;
            document.getElementById("btnFactory").disabled = score < factoryCost;
            document.getElementById("btnMine").disabled = score < mineCost;

            // The Expanded Evolution Check (Now goes up to stage 5!)
            if (score >= 1000 && evolutionStage === 0) {
                document.getElementById("rayanImage").src = "rayan1.png";
                evolutionStage = 1; 
            } else if (score >= 5000 && evolutionStage === 1) {
                document.getElementById("rayanImage").src = "rayan2.png";
                evolutionStage = 2; 
            } else if (score >= 20000 && evolutionStage === 2) {
                document.getElementById("rayanImage").src = "rayan3.png";
                evolutionStage = 3; 
            } else if (score >= 50000 && evolutionStage === 3) {
                document.getElementById("rayanImage").src = "rayan4.png";
                evolutionStage = 4; 
            } else if (score >= 100000 && evolutionStage === 4) {
                document.getElementById("rayanImage").src = "rayan5.png";
                evolutionStage = 5; 
            }
            else if (score >= 200000 && evolutionStage === 5) {
                document.getElementById("rayanImage").src = "rayan6.png";
                evolutionStage = 6; 
            }
        }

        loadGame(); 
        updateDisplay();
    </script>
</body>
</html>
